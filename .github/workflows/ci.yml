name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel obsolete runs when a PR gets a new push (or main is pushed again).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # Cache ~/.npm (npm's download cache). Speeds up `npm ci` whenever
          # node_modules cache misses, and is also shared with subprocess
          # `npm install`s elsewhere in this job.
          cache: npm
      - name: Restore node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run build

  test-cli:
    name: CLI tests (${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Restore node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - name: Build SDK for CLI package imports
        run: npm run build --workspace @agent-crm/sdk
      - run: npm run test --workspace @agent-crm/cli -- --shard ${{ matrix.shard }}/3

  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Restore node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run build --workspace @agent-crm/sdk
      - run: npm run test --workspace @agent-crm/sdk

  smoke-tarballs:
    # Pack the published-tarball shape of both packages and run the issue's
    # smoke-test gate (SDK alone exports its API; CLI+SDK install together
    # and `acrm` works end to end). Runs in parallel with build and tests.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: acrm_smoke
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d acrm_smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Restore node_modules
        id: nm
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            packages/*/node_modules
          key: nm-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - name: Install
        if: steps.nm.outputs.cache-hit != 'true'
        run: npm ci
      - run: npm run build
      - name: Pack both packages
        run: |
          npm pack --workspace @agent-crm/sdk --pack-destination "$RUNNER_TEMP"
          npm pack --workspace @agent-crm/cli --pack-destination "$RUNNER_TEMP"
      - name: SDK tarball installs and exports its public API
        # This smoke check only verifies the SDK module loads and exports a
        # non-empty named-export set; it does not need a database connection.
        run: |
          dir=$(mktemp -d)
          cd "$dir"
          npm init -y > /dev/null
          npm install --ignore-scripts --prefer-offline --no-audit --no-fund \
            "$RUNNER_TEMP"/agent-crm-sdk-*.tgz
          node -e "import('@agent-crm/sdk').then(m => { const k = Object.keys(m); if (k.length === 0) { throw new Error('SDK exported zero names'); } console.log('SDK exports:', k.length, 'names'); })"
      - name: CLI + SDK tarballs install together and acrm runs
        # Real install (scripts enabled) so CLI postinstall hooks run end to end.
        env:
          ACRM_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/acrm_smoke
        run: |
          dir=$(mktemp -d)
          cd "$dir"
          npm init -y > /dev/null
          npm install --prefer-offline --no-audit --no-fund \
            "$RUNNER_TEMP"/agent-crm-sdk-*.tgz \
            "$RUNNER_TEMP"/agent-crm-cli-*.tgz
          ./node_modules/.bin/acrm --version
          ./node_modules/.bin/acrm init
          ./node_modules/.bin/acrm records create people \
            --field name=Smoke \
            --field email_addresses=smoke@test.com
          ./node_modules/.bin/acrm execute \
            "select count(*) as n from acrm_record"
